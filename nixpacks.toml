[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.intl",
  "php82Extensions.zip",
  "php82Extensions.gd",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.tokenizer",
  "php82Extensions.xml",
  "php82Extensions.ctype",
  "php82Extensions.bcmath",
  "php82Extensions.curl",
  "nodejs_20",
  "nodePackages.npm",
  "composer"
]

[phases.build]
cmds = [
  "composer install --optimize-autoloader --no-scripts --no-interaction",
  "npm install",
  "npm run build"
]

[start]
cmd = "php artisan storage:link && php artisan migrate --force && php -S 0.0.0.0:$PORT -t public"